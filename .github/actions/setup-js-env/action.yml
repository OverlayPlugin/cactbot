name: 'Setup Node and run npm ci'
description: "run actions/setup-node and `npm ci`"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version: '>=26.4.0'
        cache: 'npm'
        cache-dependency-path: 'package-lock.json'

    - name: Update npm
      shell: bash
      run: npm i -g npm@">=11.18.0"

    - name: Install Dependencies
      shell: bash
      run: npm ci
